name: Deploy Microservices to AWS

on:
  push:
    branches: [main]
    paths:
      - 'microservices/**'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Eureka image
        working-directory: microservices/eureka-service-registry
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/eureka-service:latest .
          docker push ${{ env.ECR_REGISTRY }}/eureka-service:latest

      - name: Build and push Taco Account image
        working-directory: microservices/taco-account-app
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/taco-account:latest .
          docker push ${{ env.ECR_REGISTRY }}/taco-account:latest

      - name: Build and push Taco Order image
        working-directory: microservices/taco-order-app
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/taco-order:latest .
          docker push ${{ env.ECR_REGISTRY }}/taco-order:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            cd ~/microservices
            docker compose pull
            docker compose down
            docker compose up -d
